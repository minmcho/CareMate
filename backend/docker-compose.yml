version: "3.9"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://vitalpath:vitalpath@postgres:5432/vitalpath
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    depends_on:
      - postgres
      - redis
      - chroma

  worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./app:/app/app
    environment:
      DATABASE_URL: postgresql+asyncpg://vitalpath:vitalpath@postgres:5432/vitalpath
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - api
      - redis

  beat:
    build: .
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    volumes:
      - ./app:/app/app
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vitalpath
      POSTGRES_PASSWORD: vitalpath
      POSTGRES_DB: vitalpath
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadata:/chroma/chroma

volumes:
  pgdata:
  chromadata:
