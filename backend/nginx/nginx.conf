upstream api {
    server api:8000;
}

# Rate limiting zone: 10 req/s per IP, burst of 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Redirect HTTP → HTTPS in production (uncomment when TLS cert is mounted)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;

        limit_req zone=api_limit burst=20 nodelay;
    }

    # Health check bypass (no rate limit)
    location /healthz {
        proxy_pass http://api/healthz;
    }
    location /readyz {
        proxy_pass http://api/readyz;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'" always;

    # Hide server identity
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # Gzip
    gzip on;
    gzip_types application/json text/plain application/graphql;

    # Request body limit
    client_max_body_size 20M;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;

        limit_req zone=api_limit burst=20 nodelay;
    }

    location /healthz {
        proxy_pass http://api/healthz;
    }
    location /readyz {
        proxy_pass http://api/readyz;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    server_tokens off;
    client_max_body_size 20M;

    gzip on;
    gzip_types application/json text/plain application/graphql;
}
